<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#16110C;
    --ink-2:#211912;
    --ink-3:#2B2118;
    --gold:#C9A268;
    --gold-bright:#E8CE9A;
    --gold-deep:#8A6E42;
    --cream:#F4ECDD;
    --muted:#A6967D;
    --line:rgba(201,162,104,0.16);
    --line-strong:rgba(201,162,104,0.32);
    --neg:#C98A6A;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  html{-webkit-text-size-adjust:100%;background:var(--ink)}
  body{
    font-family:"Inter",system-ui,sans-serif;
    background:
      radial-gradient(120% 80% at 50% -10%, rgba(201,162,104,0.10), transparent 55%),
      var(--ink);
    color:var(--cream);
    min-height:100%;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:calc(env(safe-area-inset-top) + 28px) calc(env(safe-area-inset-right) + 16px) calc(env(safe-area-inset-bottom) + 48px) calc(env(safe-area-inset-left) + 16px);
    -webkit-font-smoothing:antialiased;
    -webkit-tap-highlight-color:transparent;
    overscroll-behavior:none;
    -webkit-user-select:none;
    user-select:none;
  }
  input,textarea{-webkit-user-select:text;user-select:text}
  .card{
    width:100%;
    max-width:440px;
    background:linear-gradient(180deg, var(--ink-2), #1B140E);
    border:1px solid var(--line-strong);
    border-radius:16px;
    padding:30px 28px 26px;
    box-shadow:0 24px 60px -28px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.03);
    animation:cardIn .55s cubic-bezier(.2,.7,.2,1) both;
  }
  @keyframes cardIn{from{opacity:0;transform:translateY(14px) scale(.985)}to{opacity:1;transform:none}}

  /* Header */
  .head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
  .head-left{display:flex;align-items:center;gap:12px}
  .head-left>*+*{margin-left:12px}
  .gem{flex:none}
  .eyebrow{
    font-size:10px;letter-spacing:0.32em;text-transform:uppercase;
    color:var(--gold);font-weight:600;
  }
  h1{
    font-family:"Cormorant Garamond",serif;
    font-weight:600;font-size:27px;line-height:1.1;color:var(--cream);
    margin-top:1px;
  }
  .sub{font-size:12px;color:var(--muted);margin-top:2px}
  .rule{height:1px;background:var(--line);margin:20px 0 18px}

  /* Gear + settings */
  .gear{
    flex:none;width:38px;height:38px;display:flex;align-items:center;justify-content:center;
    background:var(--ink-3);border:1px solid var(--line);border-radius:10px;cursor:pointer;
    color:var(--gold);transition:background .2s,border-color .2s,color .2s;
  }
  .gear:hover{border-color:var(--gold-deep);color:var(--gold-bright)}
  .gear.active{background:rgba(201,162,104,0.14);border-color:var(--gold);color:var(--gold-bright)}
  .gear svg{transition:transform .4s ease}
  .gear.active svg{transform:rotate(60deg)}
  .settings{
    overflow:hidden;max-height:0;opacity:0;
    transition:max-height .32s ease, opacity .24s ease, margin .32s ease;
  }
  .settings.open{max-height:480px;opacity:1;margin-top:16px}
  .settings-inner{
    background:var(--ink-3);border:1px solid var(--line);border-radius:12px;padding:16px 16px 15px;
  }
  .settings-title{
    font-size:10px;letter-spacing:0.22em;text-transform:uppercase;
    color:var(--gold);font-weight:600;margin-bottom:13px;
  }
  .setdate{font-size:11px;color:var(--muted);margin-top:8px;letter-spacing:0.02em}
  .setdate .en{color:var(--gold-deep)}
  .setdate #rateDate{color:var(--gold);font-variant-numeric:tabular-nums}
  .set-actions{display:flex;gap:8px;margin-top:15px}
  .set-actions>*+*{margin-left:8px}
  .btn{
    flex:1;padding:9px 0;font-size:12px;font-weight:500;font-family:inherit;
    background:transparent;color:var(--gold);border:1px solid var(--line);
    border-radius:8px;cursor:pointer;transition:all .15s;
  }
  .btn:hover{border-color:var(--gold);background:rgba(201,162,104,0.12);color:var(--gold-bright)}
  .status{
    font-size:11px;color:var(--gold);margin-top:10px;min-height:14px;
    opacity:0;transition:opacity .2s;letter-spacing:0.02em;
  }
  .status.show{opacity:1}

  /* Inputs */
  .field{margin-bottom:16px}
  .field label{
    display:block;font-size:11px;letter-spacing:0.06em;
    color:var(--muted);margin-bottom:7px;font-weight:500;
  }
  .field label .en{color:var(--gold-deep)}
  .input-wrap{
    position:relative;display:flex;align-items:center;
    background:var(--ink-3);border:1px solid var(--line);
    border-radius:10px;transition:border-color .18s, box-shadow .18s;
  }
  .input-wrap:focus-within{
    border-color:var(--gold);
    box-shadow:0 0 0 3px rgba(201,162,104,0.12);
  }
  .input-wrap .pre{padding-left:14px;color:var(--gold);font-size:16px;font-weight:500}
  .input-wrap .suf{padding-right:14px;color:var(--muted);font-size:13px}
  input[type="number"]{
    flex:1;width:100%;background:transparent;border:none;outline:none;
    color:var(--cream);font-family:"Inter",sans-serif;
    font-size:18px;font-weight:500;padding:12px 12px;
    text-align:right;font-variant-numeric:tabular-nums;
    -moz-appearance:textfield;
  }
  input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .row2{display:flex;gap:12px}
  .row2>*+*{margin-left:12px}
  .row2 .field{flex:1;margin-bottom:0}

  /* discount chips */
  .chips{display:flex;gap:6px;margin-top:9px}
  .chips>*+*{margin-left:6px}
  .chip{
    flex:1;padding:7px 0;font-size:12px;font-weight:500;
    background:transparent;color:var(--muted);
    border:1px solid var(--line);border-radius:8px;cursor:pointer;
    transition:all .15s;font-family:inherit;
  }
  .chip:hover{border-color:var(--gold-deep);color:var(--cream)}
  .chip.active{background:rgba(201,162,104,0.14);border-color:var(--gold);color:var(--gold-bright)}
  .hint{font-size:11px;color:var(--gold);margin-top:9px;letter-spacing:0.02em}

  /* Receipt */
  .receipt{margin-top:22px}
  .line{
    display:flex;justify-content:space-between;align-items:baseline;
    padding:9px 0;font-size:13.5px;
  }
  .line .lab{color:var(--muted)}
  .line .lab b{color:var(--cream);font-weight:500}
  .line .lab .tag{font-size:10.5px;color:var(--gold-deep);letter-spacing:0.04em}
  .line .val{font-variant-numeric:tabular-nums;font-weight:500;color:var(--cream)}
  .line.neg .val{color:var(--neg)}
  .line.add .val{color:var(--cream)}
  .line.sub{border-top:1px solid var(--line);margin-top:4px;padding-top:11px}
  .line.sub .lab b,.line.sub .val{color:var(--gold-bright)}

  /* Total hero */
  .total{
    margin-top:18px;padding-top:20px;border-top:1px solid var(--line-strong);
    text-align:right;
  }
  .total .tlab{
    font-size:11px;letter-spacing:0.16em;text-transform:uppercase;
    color:var(--gold);font-weight:600;margin-bottom:2px;
  }
  .total .tlab .en{color:var(--muted);text-transform:none;letter-spacing:0.02em;margin-left:6px;font-weight:400}
  .total .amount{
    font-family:"Cormorant Garamond",serif;
    color:var(--gold-bright);line-height:1;
    font-variant-numeric:tabular-nums;
  }
  .total .amount .yen{font-size:30px;font-weight:500;margin-right:4px;vertical-align:6px;color:var(--gold)}
  .total .amount .num{font-size:52px;font-weight:600}
  .mmk{
    font-size:17px;color:var(--gold);font-weight:500;margin-top:8px;
    font-variant-numeric:tabular-nums;letter-spacing:0.01em;
  }
  .mmk .unit{font-size:12px;color:var(--muted);margin-left:5px;font-weight:400}
  .saved{font-size:12px;color:var(--muted);margin-top:8px}
  .saved b{color:var(--gold);font-weight:500;font-variant-numeric:tabular-nums}
  .ratenote{font-size:10.5px;color:var(--gold-deep);margin-top:6px;letter-spacing:0.02em;font-variant-numeric:tabular-nums}

  .foot{
    margin-top:20px;font-size:10.5px;line-height:1.6;color:var(--gold-deep);
    letter-spacing:0.02em;border-top:1px solid var(--line);padding-top:14px;
  }

  @media (max-width:380px){
    .card{padding:26px 20px}
    .total .amount .num{font-size:44px}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
  <div class="card">
    <div class="head">
      <div class="head-left">
        <svg class="gem" width="30" height="30" viewBox="0 0 32 32" fill="none">
          <path d="M9 4h14l6 7-13 17L3 11 9 4Z" stroke="#C9A268" stroke-width="1.2" stroke-linejoin="round"/>
          <path d="M3 11h26M9 4l4 7 3-7M23 4l-4 7-3-7M13 11l3 17 3-17" stroke="#8A6E42" stroke-width="0.9" stroke-linejoin="round"/>
        </svg>
        <div>
          <div class="eyebrow">Tokyo · 宝飾</div>
          <h1>Jewellery Calculator</h1>
        </div>
      </div>
      <button class="gear" id="gearBtn" type="button" aria-label="設定 / Settings" aria-expanded="false">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
    <div class="sub">値札価格に割引・消費税・代行手数料を計算します</div>

    <!-- Settings (toggled by gear) -->
    <div class="settings" id="settings">
      <div class="settings-inner">
        <div class="settings-title">設定 · Settings</div>
        <div class="row2">
          <div class="field" style="margin-bottom:0">
            <label>消費税 <span class="en">/ Tax</span></label>
            <div class="input-wrap">
              <input type="number" id="tax" value="10" min="0" max="100" step="0.5" inputmode="decimal" style="text-align:left;padding-left:14px">
              <span class="suf">%</span>
            </div>
          </div>
          <div class="field" style="margin-bottom:0">
            <label>代行手数料 <span class="en">/ Fee</span></label>
            <div class="input-wrap">
              <input type="number" id="fee" value="5" min="0" max="100" step="0.5" inputmode="decimal" style="text-align:left;padding-left:14px">
              <span class="suf">%</span>
            </div>
          </div>
        </div>
        <div class="field" style="margin:14px 0 0">
          <label>為替レート <span class="en">/ Rate · 1 lakh MMK =</span></label>
          <div class="input-wrap">
            <span class="pre">¥</span>
            <input type="number" id="rate" value="3700" min="1" step="50" inputmode="numeric">
          </div>
          <div class="setdate">設定日 <span class="en">/ Rate set:</span> <span id="rateDate">—</span></div>
        </div>

        <div class="set-actions">
          <button class="btn" id="saveBtn" type="button">保存 · Save</button>
          <button class="btn" id="loadBtn" type="button">読込 · Load</button>
          <input type="file" id="loadFile" accept=".txt,.json,application/json,text/plain" hidden>
        </div>
        <div class="status" id="status"></div>
      </div>
    </div>

    <div class="rule"></div>

    <!-- Price tag -->
    <div class="field">
      <label>値札価格 <span class="en">/ Price tag</span></label>
      <div class="input-wrap">
        <span class="pre">¥</span>
        <input type="number" id="price" value="100000" min="0" step="1000" inputmode="numeric">
      </div>
    </div>

    <!-- Discount -->
    <div class="field">
      <label>割引 <span class="en">/ Discount</span></label>
      <div class="input-wrap">
        <input type="number" id="wari" value="6" min="0" max="10" step="0.5" inputmode="decimal" style="text-align:left;padding-left:14px">
        <span class="suf">割</span>
      </div>
      <div class="chips" id="chips">
        <button class="chip" data-w="5">5割</button>
        <button class="chip" data-w="6">6割</button>
        <button class="chip" data-w="7">7割</button>
        <button class="chip" data-w="8">8割</button>
      </div>
      <div class="hint" id="wariHint"></div>
    </div>

    <!-- Receipt -->
    <div class="receipt">
      <div class="line"><span class="lab"><b>値札価格</b> <span class="tag">Price tag</span></span><span class="val" id="rPrice">¥0</span></div>
      <div class="line neg"><span class="lab" id="rDiscLab">割引</span><span class="val" id="rDisc">−¥0</span></div>
      <div class="line sub"><span class="lab"><b>小計</b> <span class="tag">Subtotal</span></span><span class="val" id="rSub">¥0</span></div>
      <div class="line add"><span class="lab" id="rTaxLab">消費税</span><span class="val" id="rTax">+¥0</span></div>
      <div class="line add"><span class="lab" id="rFeeLab">代行手数料</span><span class="val" id="rFee">+¥0</span></div>
    </div>

    <div class="total">
      <div class="tlab">お支払い額 <span class="en">You pay</span></div>
      <div class="amount"><span class="yen">¥</span><span class="num" id="rTotal">0</span></div>
      <div class="mmk">≈ <span id="rMmk">0.00</span> <span class="unit">lakh MMK</span></div>
      <div class="saved" id="rSaved"></div>
      <div class="ratenote" id="rateNote"></div>
    </div>

    <div class="foot">
      端数は円単位で四捨五入 · 消費税は小計に対して計算 · 手数料は税込額に対して計算 · MMK = お支払い額 ÷ レート(lakh表示)
    </div>
  </div>

<script>
  const $ = id => document.getElementById(id);
  const yen = n => '¥' + Math.round(n).toLocaleString('ja-JP');
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  let prevTotal = 0;
  let mmkRate = 3700; // yen per 1 lakh MMK

  function setMmk(yenVal){
    const lakh = mmkRate > 0 ? (yenVal / mmkRate) : 0;
    $('rMmk').textContent = lakh.toFixed(2);
  }

  function updateRateNote(){
    $('rateNote').textContent =
      `レート ¥${mmkRate.toLocaleString('ja-JP')}/lakh · 設定 ${rateSetDate}`;
  }

  function num(el, fallback=0){
    const v = parseFloat(el.value);
    return isNaN(v) ? fallback : v;
  }

  function clamp(v, lo, hi){ return Math.min(hi, Math.max(lo, v)); }

  function animateTotal(to){
    const el = $('rTotal');
    if(reduceMotion){
      el.textContent = Math.round(to).toLocaleString('ja-JP');
      setMmk(to); prevTotal = to; return;
    }
    const from = prevTotal, dur = 480, start = performance.now();
    function step(t){
      const p = Math.min(1, (t - start) / dur);
      const e = 1 - Math.pow(1 - p, 3);
      const cur = from + (to - from) * e;
      el.textContent = Math.round(cur).toLocaleString('ja-JP');
      setMmk(cur);
      if(p < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
    prevTotal = to;
  }

  function calc(){
    const price = Math.max(0, num($('price')));
    const wari  = clamp(num($('wari')), 0, 10);
    const taxP  = clamp(num($('tax'), 10), 0, 100);
    const feeP  = clamp(num($('fee'), 5), 0, 100);
    mmkRate     = Math.max(1, num($('rate'), 3700));

    const payRate  = 1 - wari / 10;                 // 6割 → pay 0.4
    const subtotal = Math.round(price * payRate);   // 割引後 小計
    const discount = price - subtotal;
    const tax      = Math.round(subtotal * taxP / 100);
    const afterTax = subtotal + tax;
    const fee      = Math.round(afterTax * feeP / 100);
    const total    = afterTax + fee;

    // hint
    $('wariHint').textContent =
      `${wari}割 → ${(wari*10)}% OFF · お支払い ${Math.round(payRate*100)}%`;

    // active chip
    document.querySelectorAll('.chip').forEach(c =>
      c.classList.toggle('active', parseFloat(c.dataset.w) === wari));

    // receipt
    $('rPrice').textContent  = yen(price);
    $('rDiscLab').textContent = `割引 −${wari*10}% (${wari}割)`;
    $('rDisc').textContent   = '−' + yen(discount);
    $('rSub').textContent    = yen(subtotal);
    $('rTaxLab').innerHTML   = `消費税 <span class="tag">+${taxP}%</span>`;
    $('rTax').textContent    = '+' + yen(tax);
    $('rFeeLab').innerHTML   = `代行手数料 <span class="tag">+${feeP}%</span>`;
    $('rFee').textContent    = '+' + yen(fee);

    animateTotal(total);

    const diff = price - total;
    if(price > 0){
      $('rSaved').innerHTML = diff >= 0
        ? `値札より <b>${yen(diff)}</b> お得 (実質 ${Math.round((1 - total/price)*100)}% off)`
        : `値札より <b>${yen(-diff)}</b> 高い (税・手数料込)`;
    } else { $('rSaved').textContent = ''; }

    updateRateNote();
  }

  ['price','wari','tax','fee','rate'].forEach(id => $(id).addEventListener('input', calc));
  document.querySelectorAll('.chip').forEach(c =>
    c.addEventListener('click', () => { $('wari').value = c.dataset.w; calc(); }));

  // settings panel toggle
  const gearBtn = $('gearBtn'), settings = $('settings');
  gearBtn.addEventListener('click', () => {
    const open = settings.classList.toggle('open');
    gearBtn.classList.toggle('active', open);
    gearBtn.setAttribute('aria-expanded', open ? 'true' : 'false');
  });

  // ---- remember (text file) + rate set-date ----
  const pad = n => String(n).padStart(2, '0');
  const todayStr = () => { const d = new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; };
  let rateSetDate = todayStr();
  let lastRate = num($('rate'), 3700);

  function renderDate(){ $('rateDate').textContent = rateSetDate; updateRateNote(); }

  function flash(msg){
    const s = $('status'); s.textContent = msg; s.classList.add('show');
    clearTimeout(flash._t); flash._t = setTimeout(() => s.classList.remove('show'), 2200);
  }

  // a genuine rate change stamps today's date
  $('rate').addEventListener('input', () => {
    const r = num($('rate'), 3700);
    if(r !== lastRate){ lastRate = r; rateSetDate = todayStr(); renderDate(); }
  });

  async function saveSettings(){
    const data = {
      rate: num($('rate'), 3700),
      tax:  num($('tax'), 10),
      fee:  num($('fee'), 5),
      rateSetDate: rateSetDate,
      savedAt: new Date().toISOString()
    };
    const json = JSON.stringify(data, null, 2);
    try {
      const file = new File([json], 'jewellery-settings.txt', {type: 'text/plain'});
      if(navigator.canShare && navigator.canShare({files: [file]})){
        await navigator.share({files: [file]});
        flash('保存しました · Saved');
        return;
      }
      const blob = new Blob([json], {type: 'text/plain'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'jewellery-settings.txt';
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);
      flash('保存しました · Saved to text file');
    } catch(err){
      if(err.name !== 'AbortError') flash('保存できません · Save failed');
    }
  }

  function applySettings(d){
    if(d.rate != null){ $('rate').value = d.rate; lastRate = +d.rate; }
    if(d.tax  != null) $('tax').value = d.tax;
    if(d.fee  != null) $('fee').value = d.fee;
    if(d.rateSetDate) rateSetDate = d.rateSetDate;
    renderDate(); calc();
  }

  $('saveBtn').addEventListener('click', saveSettings);
  $('loadBtn').addEventListener('click', () => $('loadFile').click());
  $('loadFile').addEventListener('change', e => {
    const f = e.target.files[0]; if(!f) return;
    const reader = new FileReader();
    reader.onload = () => {
      try { applySettings(JSON.parse(reader.result)); flash('読み込みました · Loaded'); }
      catch(err){ flash('読み込み失敗 · Invalid file'); }
    };
    reader.readAsText(f);
    e.target.value = '';
  });

  fetch('config.json')
    .then(r => r.ok ? r.json() : {})
    .catch(() => ({}))
    .then(cfg => {
      if(cfg.mmkRate){ $('rate').value = cfg.mmkRate; lastRate = cfg.mmkRate; }
      renderDate(); calc();
    });
</script>
</body>
</html>
